version: 2
updates:
  # Keep GitHub Actions current. Grouped into a single PR so updates don't
  # sprawl into many branches.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # Python dependency bumps for the package + extras, also grouped into one PR.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
