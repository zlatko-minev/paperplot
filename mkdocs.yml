site_name: paperplot
site_description: Publication-correct matplotlib figures, journal by journal.
repo_url: https://github.com/zlatko-minev/paperplot
repo_name: paperplot
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Gallery: gallery.md
  - Showcase: showcase.ipynb

plugins:
  - search
  - mkdocs-jupyter:
      execute: true           # run the committed (clean) notebook at build; cached after
      allow_errors: false     # a failing showcase cell fails the docs build
      include_source: true
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

# Gallery images are generated by docs/generate_gallery.py (run in CI before build).
exclude_docs: |
  generate_gallery.py
